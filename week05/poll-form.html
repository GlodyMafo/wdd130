<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WWD 130| HTML Form - User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
  </head>
  <body>
    <header>
      <h1>WWD 130| HTML Form - User Poll</h1>
    </header>

    <main>
      <form>
        <fieldset>
          <legend>Contact Information</legend>
          <div class="form-item column2">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" />
          </div>
          
          <div class="form-item column2">
            <label for="useremail">Email:</label>
            <input type="text" id="useremail" name="useremail" />
          </div>
        </fieldset>

        <fieldset>
          <legend>Question</legend>
          <label for="browser">What is your favorite browser?</label>
          <div class="column1">
            <select name="browser" id="browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
              </select>
          </div>
         
          <label for="pet">Do you have a household pet?</label>
          <input type="checkbox" id="pet" name="pet">
          <label for="feedback">List the places you have lived:</label>
          <textarea name="feedback" id="feedback" rows="4" placeholder="Still Lubumbashi"></textarea>
        </fieldset>

        <button type="submit">Submit Poll</button>
      </form>
    </main>

    <footer>
      <p>©️2024| HTML Form - User Poll Activity | Glody Mafo Kisanga</p>
    </footer>
  </body>
</html>
